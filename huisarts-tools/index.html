<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F7F6F3" />
  <meta name="description" content="Klinische rekentools en wijzers voor de Nederlandse huisartsenpraktijk" />

  <!-- iOS PWA tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Praktijktools" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <title>Praktijktools</title>

  <!-- Editorial typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ----------------------------------------------------------------
       Design tokens — Editorial Minimalist
    ---------------------------------------------------------------- */
    :root {
      --bg: #F7F6F3;
      --surface: #FFFFFF;
      --surface-2: #F9F9F8;
      --ink: #1A1A1A;
      --ink-2: #2F3437;
      --muted: #787774;
      --muted-2: #9B9A97;
      --border: #EAEAEA;
      --border-strong: #D7D6D2;

      --red-bg: #FDEBEC;
      --red-ink: #9F2F2D;
      --blue-bg: #E1F3FE;
      --blue-ink: #1F6C9F;
      --green-bg: #EDF3EC;
      --green-ink: #346538;
      --yellow-bg: #FBF3DB;
      --yellow-ink: #956400;
      --amber-bg: #FAEFE0;
      --amber-ink: #8B5A1E;

      --font-serif: 'Newsreader', 'Lyon Text', Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px var(--border);

      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: none;
      min-height: 100vh;
      min-height: 100dvh;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }

    /* ----------------------------------------------------------------
       App shell
    ---------------------------------------------------------------- */
    #app {
      max-width: 720px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 16px) 20px calc(var(--safe-bottom) + 40px) 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      min-height: 36px;
    }
    .topbar-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      padding: 0;
    }
    .topbar-back:active { transform: scale(0.96); }

    /* ----------------------------------------------------------------
       Home — masthead + search
    ---------------------------------------------------------------- */
    .masthead {
      padding: 8px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .masthead-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .masthead h1 {
      font-family: var(--font-serif);
      font-size: 38px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin: 0 0 8px 0;
      color: var(--ink);
    }
    .masthead h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--muted);
    }
    .masthead p {
      font-size: 15px;
      color: var(--muted);
      margin: 8px 0 0 0;
      max-width: 28em;
      line-height: 1.55;
    }

    .search {
      position: relative;
      margin: 18px 0 0 0;
    }
    .search input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 150ms ease;
    }
    .search input:focus {
      border-color: var(--ink);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* ----------------------------------------------------------------
       Category sections
    ---------------------------------------------------------------- */
    .section {
      margin: 0 0 36px 0;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .section-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Tool grid */
    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (min-width: 540px) {
      .tool-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .tool-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease;
      min-height: 92px;
    }
    .tool-card:active {
      transform: scale(0.98);
      border-color: var(--border-strong);
    }
    .tool-card-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
    }
    .tool-card-name {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.015em;
      line-height: 1.2;
      color: var(--ink);
    }
    .tool-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 2px;
    }
    .tool-card.featured {
      grid-column: span 2;
      min-height: 110px;
    }
    @media (min-width: 540px) {
      .tool-card.featured { grid-column: span 2; }
    }

    /* ----------------------------------------------------------------
       Tool view
    ---------------------------------------------------------------- */
    .tool-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      margin-bottom: 24px;
    }
    .tool-view h2 {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin: 0 0 6px 0;
      color: var(--ink);
    }
    .tool-view .tool-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    /* Form elements */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      letter-spacing: -0.005em;
    }
    .field .hint {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .field input[type="number"],
    .field input[type="text"],
    .field select,
    .field textarea {
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color 150ms ease;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--ink); }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Segmented control */
    .segmented {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: 3px;
    }
    .segmented button {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: var(--muted);
      border-radius: 4px;
      font-weight: 500;
      transition: all 150ms ease;
    }
    .segmented button.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    /* Checkbox row */
    .checkrow {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .checkrow:last-child { border-bottom: none; }
    .checkrow input[type="checkbox"] {
      margin: 3px 0 0 0;
      width: 18px; height: 18px;
      accent-color: var(--ink);
      flex-shrink: 0;
    }
    .checkrow-text {
      flex: 1;
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.4;
    }
    .checkrow-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* Radio scale (PHQ-9 / GAD-7) */
    .scale-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .scale-item:last-child { border-bottom: none; }
    .scale-q {
      font-size: 14px;
      color: var(--ink-2);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .scale-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .scale-options button {
      padding: 10px 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      font-size: 12px;
      color: var(--ink-2);
      transition: all 150ms ease;
      line-height: 1.2;
      font-family: var(--font-mono);
    }
    .scale-options button.active {
      background: var(--ink);
      color: var(--surface);
      border-color: var(--ink);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .btn-primary {
      background: var(--ink);
      color: var(--surface);
      width: 100%;
    }
    .btn-primary:active { transform: scale(0.98); background: #333; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 10px 14px;
      font-size: 13px;
    }

    /* Result card */
    .result {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
    }
    .result-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .result-value {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .result-value .unit {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
      margin-left: 6px;
    }
    .result-interpretation {
      font-size: 14px;
      color: var(--ink-2);
      margin-top: 12px;
      line-height: 1.55;
    }
    .result-detail {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
    .result-detail strong { color: var(--ink-2); font-weight: 500; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 9999px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
      margin-right: 6px;
    }
    .tag-red { background: var(--red-bg); color: var(--red-ink); }
    .tag-blue { background: var(--blue-bg); color: var(--blue-ink); }
    .tag-green { background: var(--green-bg); color: var(--green-ink); }
    .tag-yellow { background: var(--yellow-bg); color: var(--yellow-ink); }
    .tag-amber { background: var(--amber-bg); color: var(--amber-ink); }
    .tag-muted { background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }

    /* Flag box (warnings) */
    .flag {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 12px;
    }
    .flag-red { background: var(--red-bg); color: var(--red-ink); }
    .flag-amber { background: var(--amber-bg); color: var(--amber-ink); }
    .flag-blue { background: var(--blue-bg); color: var(--blue-ink); }
    .flag-green { background: var(--green-bg); color: var(--green-ink); }
    .flag strong { font-weight: 500; }

    /* Lookup tables */
    .lookup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .lookup-row:last-child { border-bottom: none; }
    .lookup-row-label { color: var(--ink-2); }
    .lookup-row-value {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink);
    }

    /* Protocol cards (anafylaxie etc) */
    .protocol-step {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .protocol-step:last-child { border-bottom: none; }
    .protocol-step-num {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      width: 28px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .protocol-step-body { flex: 1; font-size: 14px; color: var(--ink-2); line-height: 1.5; }
    .protocol-step-body strong { color: var(--ink); font-weight: 500; }

    /* Footer */
    .app-footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
      line-height: 1.6;
    }
    .app-footer a { color: var(--ink-2); text-decoration: none; border-bottom: 1px solid var(--border); }

    /* Disclaimer block */
    .disclaimer {
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 20px;
    }

    /* Subtle entry animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 320ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Description list for switch matrices */
    .matrix-row {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .matrix-row:last-child { border-bottom: none; }
    .matrix-from-to {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .matrix-strategy {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.55;
    }
    .matrix-strategy strong { color: var(--ink); font-weight: 500; }

    /* Loading / empty states */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Install hint banner */
    .install-hint {
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .install-hint .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      padding: 0 4px;
      cursor: pointer;
    }

    /* Lists in protocol view */
    ul.clean-list {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    ul.clean-list li {
      padding: 6px 0 6px 16px;
      position: relative;
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    ul.clean-list li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
  /* ==================================================================
     PRAKTIJKTOOLS — Single-file PWA
     Klinische rekentools en wijzers voor de Nederlandse huisarts
     ================================================================== */

  // ------------------------------------------------------------------
  // App state + routing (hash-based)
  // ------------------------------------------------------------------
  const App = {
    el: document.getElementById('app'),
    state: { view: 'home', toolId: null, search: '', formState: {} },
    init() {
      window.addEventListener('hashchange', () => this.handleRoute());
      this.handleRoute();
      this.registerSW();
    },
    handleRoute() {
      const hash = location.hash.replace(/^#\/?/, '');
      if (!hash) {
        this.state.view = 'home';
        this.state.toolId = null;
        this.state.formState = {};
      } else {
        this.state.view = 'tool';
        this.state.toolId = hash;
        this.state.formState = {};
      }
      this.render();
      window.scrollTo({ top: 0, behavior: 'instant' });
    },
    navigate(toolId) {
      location.hash = '/' + toolId;
    },
    back() {
      location.hash = '';
    },
    render() {
      if (this.state.view === 'home') {
        this.el.innerHTML = renderHome(this.state.search);
        const sb = document.getElementById('searchbox');
        if (sb) {
          sb.addEventListener('input', (e) => {
            this.state.search = e.target.value;
            const grid = document.getElementById('tool-sections');
            if (grid) grid.innerHTML = renderToolSections(this.state.search);
          });
        }
      } else {
        const tool = TOOLS.find(t => t.id === this.state.toolId);
        if (!tool) {
          this.el.innerHTML = renderShell(`
            <div class="empty">
              <p>Tool niet gevonden.</p>
              <button class="btn-ghost" onclick="App.back()">Terug</button>
            </div>
          `, '');
          return;
        }
        this.el.innerHTML = renderShell(tool.render(), tool.name);
        // Wire up listeners
        if (tool.onMount) tool.onMount();
      }
    },
    registerSW() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    }
  };

  function renderShell(inner, title) {
    return `
      <div class="topbar fade-in">
        <button class="topbar-back" onclick="App.back()" aria-label="Terug">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        </button>
        <div class="topbar-title">${escape(title)}</div>
        <div style="width:36px"></div>
      </div>
      <div class="fade-in">${inner}</div>
      <div class="app-footer">
        Praktijktools v0.1 · Het Roosendael · Niet bedoeld ter vervanging van klinisch oordeel.
      </div>
    `;
  }

  // ------------------------------------------------------------------
  // Home view
  // ------------------------------------------------------------------
  function renderHome(search) {
    return `
      <header class="masthead fade-in">
        <div class="masthead-eyebrow">Praktijktools · v0.1</div>
        <h1>Klinische gereedschapskist <em>voor de huisartsenpraktijk</em></h1>
        <p>Switch-kaarten, rekenformules en wijzers — gebundeld voor het spreekuur. Werkt offline.</p>
        <div class="search">
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          </span>

          document.querySelectorAll('#seg-age-c button').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          computeCentor();
        });
      });
      computeCentor();
    }
  });
  function computeCentor() {
    let score = 0;
    document.querySelectorAll('input[data-grp="centor"]').forEach(i => { if (i.checked) score++; });
    const ageAdj = document.querySelector('#seg-age-c button.active');
    if (ageAdj) score += parseInt(ageAdj.dataset.v);
    let prob, advice, color;
    if (score <= 1) { prob = '< 10%'; color = 'green'; advice = 'Geen kweek of antibioticum. Symptomatisch behandelen.'; }
    else if (score === 2) { prob = '11–17%'; color = 'yellow'; advice = 'Eventueel kweek/sneltest overwegen, geen empirisch antibioticum.'; }
    else if (score === 3) { prob = '28–35%'; color = 'amber'; advice = 'Volgens NHG: zelden antibioticum — alleen bij ernstig zieke, immuuncompromis, of risicogroepen.'; }
    else { prob = '> 50%'; color = 'amber'; advice = 'Bij ernstig zieke patiënt: feneticilline 500 mg 3dd 7 dagen. NHG raadt afwachten aan bij niet-ernstig zieke patiënt.'; }
    $('centor-out').innerHTML = `
      <div class="result">
        <div class="result-eyebrow">McIsaac-score</div>
        <div class="result-value">${score}<span class="unit">/ 5</span></div>
        <div><span class="tag tag-${color}">Kans op GAS: ${prob}</span></div>
        <div class="result-interpretation">${escape(advice)}</div>
        <div class="result-detail">NHG-Standaard Acute Keelpijn benadrukt dat antibiotica de ziekteduur slechts met 1–2 dagen verkort en complicaties (acuut reuma) in Nederland zeldzaam zijn.</div>
      </div>
    `;
  }

  /* ------------------------------------------------------------------

  TOOLS.push({

  });
  function computeWells() {
    let score = 0;
    document.querySelectorAll('input[data-grp="wells"]').forEach(i => { if (i.checked) score += parseInt(i.dataset.pts); });
    let cat, color, advice;
    if (score <= 1) { cat = 'DVT onwaarschijnlijk'; color = 'green'; advice = 'D-dimeer bepalen — bij normale waarde DVT uitgesloten. Bij verhoogde D-dimeer: echo.'; }
    else { cat = 'DVT waarschijnlijk'; color = 'amber'; advice = 'Direct echografie compressie of duplex. D-dimeer niet meer nuttig voor uitsluiting.'; }
    $('wells-out').innerHTML = `
      <div class="result">
        <div class="result-eyebrow">Wells-score</div>
        <div class="result-value">${score}<span class="unit">punten</span></div>
        <div><span class="tag tag-${color}">${escape(cat)}</span></div>
        <div class="result-interpretation">${escape(advice)}</div>
      </div>
    `;
  }

  /* ------------------------------------------------------------------
     16. AUDIT-C (alcohol screening)
  ------------------------------------------------------------------ */
  TOOLS.push({
    id: 'audit-c',
    name: 'AUDIT-C',
    category: 'GGZ-scores',
    metaLabel: 'Alcohol · 3 items',
    desc: 'Screening problematisch alcoholgebruik',
    keywords: ['audit','alcohol','screening'],
    render() {
      return `
        <div class="tool-view">
          <h2>AUDIT-C</h2>
          <div class="tool-subtitle">Korte versie van de AUDIT — drie vragen over alcoholconsumptie.</div>
          <div class="scale-item">
            <div class="scale-q">1. Hoe vaak drinkt u alcohol?</div>
            <div class="scale-options" data-q="0">
              <button data-v="0">Nooit</button><button data-v="1">≤1 / mnd</button><button data-v="2">2–4 / mnd</button><button data-v="3">2–3 / wk</button>
            </div>
            <div class="scale-options" data-q="0b" style="margin-top:6px;grid-template-columns:1fr">
              <button data-v="4">4 of meer per week</button>
            </div>
          </div>
          <div class="scale-item">
            <div class="scale-q">2. Hoeveel glazen alcohol drinkt u op een typische drinkdag?</div>
            <div class="scale-options" data-q="1">
              <button data-v="0">1 of 2</button><button data-v="1">3 of 4</button><button data-v="2">5 of 6</button><button data-v="3">7–9</button>
            </div>
            <div class="scale-options" data-q="1b" style="margin-top:6px;grid-template-columns:1fr">
              <button data-v="4">10 of meer</button>
            </div>
          </div>
          <div class="scale-item">
            <div class="scale-q">3. Hoe vaak drinkt u 6 of meer glazen alcohol bij één gelegenheid?</div>
            <div class="scale-options" data-q="2">
              <button data-v="0">Nooit</button><button data-v="1">&lt; 1/mnd</button><button data-v="2">Maandelijks</button><button data-v="3">Wekelijks</button>
            </div>
            <div class="scale-options" data-q="2b" style="margin-top:6px;grid-template-columns:1fr">
              <button data-v="4">Dagelijks</button>
            </div>
          </div>
          <div id="auditc-out" style="margin-top:16px"></div>
        </div>
      `;
    },
    onMount() {
      document.querySelectorAll('#app .scale-options').forEach(grp => {
        grp.querySelectorAll('button').forEach(b => {
          b.addEventListener('click', () => {
            // Clear all sibling groups for the same question
            const qBase = grp.dataset.q.replace('b','');
            document.querySelectorAll(`.scale-options[data-q^="${qBase}"]`).forEach(g => {
              g.querySelectorAll('button').forEach(x => x.classList.remove('active'));
            });
            b.classList.add('active');
            computeAuditC();
          });
        });
      });
    }
  });
  function computeAuditC() {
    let total = 0, answered = 0;
    [0,1,2].forEach(i => {
      const active = document.querySelector(`.scale-options[data-q^="${i}"] button.active`);
      if (active) { total += parseInt(active.dataset.v); answered++; }
    });
    if (answered === 0) { $('auditc-out').innerHTML = ''; return; }
    let cat, color, advice;
    if (total <= 2) { cat = 'Geen indicatie'; color = 'green'; advice = 'Geen problematisch alcoholgebruik volgens AUDIT-C.'; }
    else if ((total >= 4 && document.querySelector('input[data-sex="m"]')) || total >= 3) {
      // simplified: women ≥3, men ≥4 considered positive
      cat = 'Positief'; color = 'amber'; advice = 'Mogelijk problematisch gebruik. Verdiep met volledige AUDIT-10 en bespreek. Bij score ≥8 (volledige AUDIT): verwijs naar verslavingszorg.';
    } else {
      cat = 'Grenswaarde'; color = 'yellow'; advice = 'Bij vrouwen ≥3 / mannen ≥4 al verdacht. Korte interventie overwegen.';
    }
    $('auditc-out').innerHTML = `
      <div class="result">
        <div class="result-eyebrow">AUDIT-C totaal</div>
        <div class="result-value">${total}<span class="unit">/ 12</span></div>
        <div><span class="tag tag-${color}">${escape(cat)}</span></div>
        <div class="result-interpretation">${escape(advice)}</div>
        <div class="result-detail">Afkapwaarden: vrouwen ≥3, mannen ≥4. Bij positieve screening volledige AUDIT-10 afnemen.</div>
      </div>
    `;
  }

  /* ------------------------------------------------------------------
     17. FINDRISC (diabetes screening)
  ------------------------------------------------------------------ */
  TOOLS.push({
    id: 'findrisc',
    name: 'FINDRISC',
    category: 'Rekenformules',
    metaLabel: 'Diabetes · screening',
    desc: '10-jaars risico op diabetes type 2',
    keywords: ['findrisc','diabetes','screening','dm2'],
    render() {
      return `
        <div class="tool-view">
          <h2>FINDRISC</h2>
          <div class="tool-subtitle">Finnish Diabetes Risk Score. Voorspelt 10-jaars risico op DM type 2.</div>

          <div class="field"><label>Leeftijd</label>
            <div class="segmented" id="fr-age">
              <button class="active" data-v="0">&lt;45</button>
              <button data-v="2">45–54</button>
              <button data-v="3">55–64</button>
              <button data-v="4">≥65</button>
            </div>
          </div>
          <div class="field"><label>BMI</label>
            <div class="segmented" id="fr-bmi">
              <button class="active" data-v="0">&lt;25</button>
              <button data-v="1">25–30</button>
              <button data-v="3">&gt;30</button>

          </div>
          <div class="field"><label>Middelomtrek (man / vrouw)</label>

          </div>

          </div>
          <div class="field"><label>Dagelijks groente en fruit</label>
            <div class="segmented" id="fr-veg"><button class="active" data-v="0">Ja</button><button data-v="1">Nee</button></div>
          </div>
          <div class="field"><label>Ooit antihypertensiva gebruikt</label>
            <div class="segmented" id="fr-bp"><button class="active" data-v="0">Nee</button><button data-v="2">Ja</button></div>
          </div>
          <div class="field"><label>Ooit verhoogde glucose gemeten</label>
            <div class="segmented" id="fr-gluc"><button class="active" data-v="0">Nee</button><button data-v="5">Ja</button></div>
          </div>
          <div class="field"><label>Familie met diabetes</label>
            <div class="segmented" id="fr-fam">
              <button class="active" data-v="0">Nee</button>
              <button data-v="3">Grootouders/oom/tante/neef-nicht</button>
              <button data-v="5">Ouders/broer/zus/eigen kind</button>
            </div>
          </div>
          <button class="btn btn-primary" onclick="computeFINDRISC()">Berekenen</button>
          <div id="fr-out"></div>
        </div>
      `;
    },
    onMount() {
      ['fr-age','fr-bmi','fr-waist','fr-act','fr-veg','fr-bp','fr-gluc','fr-fam'].forEach(id => {
        document.querySelectorAll(`#${id} button`).forEach(b => {
          b.addEventListener('click', () => {
            document.querySelectorAll(`#${id} button`).forEach(x => x.classList.remove('active'));
            b.classList.add('active');
          });
        });
      });
    }
  });
  function computeFINDRISC() {
    let total = 0;
    ['fr-age','fr-bmi','fr-waist','fr-act','fr-veg','fr-bp','fr-gluc','fr-fam'].forEach(id => {
      const a = document.querySelector(`#${id} button.active`);
      if (a) total += parseInt(a.dataset.v);
    });
    let cat, color, risk;
    if (total < 7) { cat = 'Laag'; color = 'green'; risk = '1% (1 op 100)'; }
    else if (total < 12) { cat = 'Licht verhoogd'; color = 'green'; risk = '4% (1 op 25)'; }
    else if (total < 15) { cat = 'Matig'; color = 'yellow'; risk = '17% (1 op 6)'; }
    else if (total < 20) { cat = 'Hoog'; color = 'amber'; risk = '33% (1 op 3)'; }
    else { cat = 'Zeer hoog'; color = 'red'; risk = '50% (1 op 2)'; }
    $('fr-out').innerHTML = `
      <div class="result">
        <div class="result-eyebrow">FINDRISC totaal</div>
        <div class="result-value">${total}<span class="unit">/ 26</span></div>
        <div><span class="tag tag-${color}">${escape(cat)} risico</span></div>
        <div class="result-interpretation">10-jaars risico op DM2: ${risk}.</div>
        <div class="result-detail">${total >= 15 ? 'Overweeg nuchter glucose of HbA1c-bepaling en leefstijlinterventie.' : 'Leefstijladvies, herhaal screening over 3–5 jaar.'}</div>
      </div>
    `;

  /* ------------------------------------------------------------------
     18. HRT-stroomschema
  ------------------------------------------------------------------ */
  TOOLS.push({
    id: 'hrt',
    name: 'Hormonale substitutie (HRT)',
    category: 'Gynaecologie & endocrien',
    metaLabel: 'Overgang · NHG',
    desc: 'Keuze oestrogeen-progestageen-combinatie',
    keywords: ['hrt','overgang','menopauze','oestrogeen','progestageen'],
    render() {
      return `
        <div class="tool-view">
          <h2>Hormonale substitutie</h2>
          <div class="tool-subtitle">Behandeling van klimakterische klachten. Vereist gedeelde besluitvorming over baten en risico's, jaarlijks evalueren.</div>

          <div class="field"><label>Uterus aanwezig</label>
            <div class="segmented" id="hrt-ut"><button class="active" data-v="1">Ja</button><button data-v="0">Nee (hysterectomie)</button></div>
          </div>
          <div class="field"><label>Tijd sinds laatste menstruatie</label>
            <div class="segmented" id="hrt-meno">
              <button class="active" data-v="peri">&lt; 1 jaar (perimenopauze)</button>
              <button data-v="post">≥ 1 jaar (postmenopauze)</button>
            </div>
          </div>
          <div class="field"><label>Belangrijke klacht</label>
            <div class="segmented" id="hrt-comp">
              <button class="active" data-v="vasomotor">Opvliegers / zweten</button>
              <button data-v="uro">Urogenitale atrofie</button>
            </div>
          </div>
          <button class="btn btn-primary" onclick="computeHRT()">Behandeladvies</button>
          <div id="hrt-out"></div>

          <div class="disclaimer">Contra-indicaties: oestrogeen-receptor-positief mammacarcinoom, actieve VTE, actieve leverziekte, niet-onderzocht vaginaal bloedverlies. Verhoogde voorzichtigheid bij migraine met aura, hypertensie, eerdere VTE, eerstegraads familiair mammacarcinoom.</div>
        </div>
      `;
    },
    onMount() {
      ['hrt-ut','hrt-meno','hrt-comp'].forEach(id => {
        document.querySelectorAll(`#${id} button`).forEach(b => {
          b.addEventListener('click', () => {
            document.querySelectorAll(`#${id} button`).forEach(x => x.classList.remove('active'));
            b.classList.add('active');
          });
        });
      });
    }
  });
  function computeHRT() {
    const ut = document.querySelector('#hrt-ut button.active').dataset.v;
    const meno = document.querySelector('#hrt-meno button.active').dataset.v;
    const comp = document.querySelector('#hrt-comp button.active').dataset.v;

    let advice = '';
    if (comp === 'uro') {
      advice = `
        <strong>Lokale oestrogeen-therapie</strong>: oestradiol vaginaal (Vagifem 10 μg) 2 weken dagelijks, daarna 2× per week. Lage systemische opname, geen progestageen nodig zelfs bij intacte uterus. Effect na 2–4 weken.
        <div class="flag flag-blue" style="margin-top:12px">Lokale oestrogeen kan veilig gegeven worden bij vrouwen met mammacarcinoom in voorgeschiedenis — overleg met behandelend oncoloog.</div>
      `;
    } else if (ut === '1' && meno === 'peri') {
      advice = `
        <strong>Sequentiële combinatietherapie</strong>: oestradiol continu + progestageen 12–14 dagen per maand. Geeft regelmatige onttrekkingsbloeding. Voorkeur in perimenopauze.<br><br>
        Voorbeeld: oestradiol 1–2 mg/dag + dydrogesteron 10 mg dag 15–28, of een gefixeerde combinatiepreparaat.
      `;
    } else if (ut === '1' && meno === 'post') {
      advice = `
        <strong>Continu-gecombineerde therapie</strong>: oestradiol + progestageen dagelijks zonder onderbreking. Geen onttrekkingsbloeding. Voorkeur in postmenopauze.<br><br>
        Voorbeeld: oestradiol 1 mg + dydrogesteron 5 mg combinatietablet, of estradiol pleister + Mirena-spiraal (effectieve progestageen-suppletie).
      `;
    } else {
      advice = `
        <strong>Alleen oestrogeentherapie</strong>: bij hysterectomie geen progestageen nodig.<br><br>
        Voorbeeld: oestradiol 1–2 mg oraal dagelijks of pleister 50 μg 2× per week.
      `;
    }

    const route = `
      <div class="result-detail">
        <strong>Toedieningsroute:</strong><br>
        – <strong>Transdermaal (pleister/gel):</strong> voorkeur bij verhoogd VTE-risico, hypertriglyceridemie, leverenzymstoornis. Geen first-pass effect.<br>
        – <strong>Oraal:</strong> goedkoper, geschikt bij laag-risico vrouwen zonder contra-indicaties.<br><br>
        <strong>Duur:</strong> herevalueer jaarlijks. Niet automatisch staken na 5 jaar — voortzetten zo lang baten boven risico's wegen.
      </div>
    `;

    $('hrt-out').innerHTML = `
      <div class="result">
        <div class="result-eyebrow">Aanbevolen regime</div>
        <div class="result-interpretation" style="font-size:15px;margin-top:8px">${advice}</div>
        ${route}
      </div>
    `;
  }
